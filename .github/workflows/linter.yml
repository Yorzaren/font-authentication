---
name: Lint Code Base

on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write
      statuses: write # Report to GH Actions for commit status
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          # Check everything if manually triggered otherwise do the new/modified files.
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' }}
          VALIDATE_JAVASCRIPT_STANDARD: false # I dont like this linter
          VALIDATE_PYTHON_BLACK: false # Just run it as black -l 120 .
          VALIDATE_PYTHON_ISORT: false # Just run manually
